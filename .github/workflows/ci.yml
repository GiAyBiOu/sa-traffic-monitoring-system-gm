name: TMS CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dashboard.txt
          pip install -r requirements-simulator.txt

      - name: Verify imports
        run: |
          cd ${{ github.workspace }}
          python -c "from shared.settings import load_settings; print('Settings OK')"
          python -c "from shared.models import VehicleEvent, TrafficMetric, Infraction; print('Models OK')"
          python -c "from shared.generators import generate_events_for_interval; print('Generators OK')"
          python -c "from shared.locations import BOLIVIA_LOCATIONS; print(f'Locations OK: {len(BOLIVIA_LOCATIONS)} configured')"
          python -c "from shared.observability import MetricsCollector; print('Observability OK')"

      - name: Run smoke tests
        run: |
          python -c "
          from shared.generators import generate_events_for_interval
          from shared.models import TrafficState
          from datetime import datetime, timezone
          events = generate_events_for_interval('loc-scz-001', 60, TrafficState.FREE_FLOW, datetime.now(timezone.utc))
          assert len(events) > 0, 'No events generated'
          assert all(e.location_id == 'loc-scz-001' for e in events), 'Wrong location'
          infractions = [e for e in events if e.is_infraction]
          print(f'Generated {len(events)} events, {len(infractions)} infractions — PASS')
          "

  build-containers:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build all service images
        run: |
          docker compose build
          echo "All images built successfully"

      - name: Start services
        run: |
          docker compose up -d
          sleep 30
          docker compose ps

      - name: Health check all services
        run: |
          for port in 8001 8002 8003 8004; do
            STATUS=$(curl -s http://localhost:$port/health | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])")
            echo "Port $port: $STATUS"
            if [ "$STATUS" != "healthy" ]; then exit 1; fi
          done
          echo "All services healthy"

      - name: Verify metrics endpoints
        run: |
          for port in 8001 8002 8003 8004; do
            curl -s http://localhost:$port/metrics | head -5
            echo "---"
          done

      - name: Cleanup
        if: always()
        run: docker compose down
